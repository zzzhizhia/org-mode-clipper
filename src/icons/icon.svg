<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Clipboard clip at top center -->
  <rect x="40" y="6" width="48" height="28" rx="8" fill="#77aa99"/>

  <!-- Clipboard base plate -->
  <rect x="14" y="20" width="100" height="104" rx="10" fill="#587e71"/>

  <!-- Clip opening (dark inset showing the clip slot) -->
  <rect x="50" y="11" width="28" height="16" rx="5" fill="#3d5a4f"/>

  <!-- Inner content area -->
  <rect x="24" y="38" width="80" height="78" rx="6" fill="#ecf3ee"/>

  <!-- Org-mode asterisk: 6-armed star -->
  <g transform="translate(64, 74)" stroke="#587e71" stroke-width="8" stroke-linecap="round">
    <line x1="0" y1="-26" x2="0" y2="26"/>
    <line x1="-22.5" y1="-13" x2="22.5" y2="13"/>
    <line x1="-22.5" y1="13" x2="22.5" y2="-13"/>
  </g>
</svg>
